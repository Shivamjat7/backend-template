#run command: docker compose watch
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile

    ports:
      - "5000:5000"

    environment:
      NODE_ENV: development

    develop:
      watch:
        # Sync source files
        - action: sync
          path: .
          target: /app
          ignore:
            - node_modules/
            - .git/
            - dist/
            - coverage/
            - logs/

        # Rebuild when dependencies change
        - action: rebuild
          path: package.json

        - action: rebuild
          path: package-lock.json